<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeDigital | Institutional Digital Assets</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.7s ease-out forwards; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }
        .touch-active:active { transform: scale(0.98); }
        .image-overlay { background: linear-gradient(to top, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.2) 50%, transparent 100%); }
        .receipt-border { border: 2px dashed #E2E8F0; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- UI Components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SafeImage = ({ src, alt, title }) => {
            const [error, setError] = useState(false);
            if (error || !src) {
                return (
                    <div className="w-full h-full bg-gradient-to-br from-blue-900 to-blue-700 flex flex-col items-center justify-center p-8 text-center">
                        <Icon name="book-open" size={48} className="text-blue-400/50 mb-4" />
                        <span className="font-serif italic text-white/90 text-lg leading-tight">{title}</span>
                        <div className="mt-4 w-12 h-1 bg-blue-500/30 rounded-full"></div>
                    </div>
                );
            }
            return (
                <img 
                    src={src} 
                    alt={alt} 
                    className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
                    onError={() => setError(true)}
                />
            );
        };

        // --- DATA ---
        const TOKEN_UNIT_PRICE = 12.50;
        const NETWORK_NAME = "Polygon Mainnet";

        const CATEGORIES = [
            {
                id: 'cat-1',
                name: 'Global Bestsellers',
                books: [
                    { id: 'eb-01', title: 'The Bitcoin Standard', price: 29.00, tag: 'Bestseller', image: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?q=80&w=800&auto=format&fit=crop' },
                    { id: 'eb-02', title: 'Mastering Bitcoin', price: 39.00, tag: 'Technical', image: 'https://images.unsplash.com/photo-1621416848446-9f6efdec403d?q=80&w=800&auto=format&fit=crop' },
                    { id: 'eb-03', title: 'Blockchain Revolution', price: 35.00, tag: 'Essential', image: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=800&auto=format&fit=crop' }
                ]
            },
            {
                id: 'cat-2',
                name: 'Strategic Assets',
                books: [
                    { id: 'eb-04', title: 'Digital Gold', price: 45.00, tag: 'Recommended', image: 'https://images.unsplash.com/photo-1620321023374-d1a68fbc720d?q=80&w=800&auto=format&fit=crop' },
                    { id: 'eb-05', title: 'The Infinite Machine', price: 55.00, tag: 'New Release', image: 'https://images.unsplash.com/photo-1640341719942-0268302abc0a?q=80&w=800&auto=format&fit=crop' },
                    { id: 'eb-06', title: 'Layer 2 Economics', price: 32.00, tag: 'Advanced', image: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=800&auto=format&fit=crop' }
                ]
            }
        ];

        const TRANSLATIONS = {
            EN: {
                hero: "Institutional Digital Assets.",
                subHero: "Secure acquisition of Genesis ERC20 tokens and curated digital literature. Built on Polygon, designed for the high-end European economy.",
                tokenTitle: "Genesis Utility Token",
                buyNow: "Authorize & Purchase",
                email: "Delivery Email",
                wallet: "Polygon Destination",
                terms: "I acknowledge that transfers on the Polygon Network are irreversible and non-refundable upon delivery.",
                status: ["Creating Checkout...", "Verifying Payment", "Pending Delivery", "Asset Delivered"],
                connect: "Connect Wallet",
                history: "History",
                back: "Back",
                noHistory: "No acquisitions found in current session."
            }
        };

        function App() {
            const [lang, setLang] = useState('EN');
            const [view, setView] = useState('home');
            const [selected, setSelected] = useState(null);
            const [step, setStep] = useState(0);
            const [searchQuery, setSearchQuery] = useState('');
            
            // Purchase History State
            const [purchaseHistory, setPurchaseHistory] = useState([]);
            const [currentTransactionId, setCurrentTransactionId] = useState('');
            
            // Wallet States
            const [isWalletModalOpen, setIsWalletModalOpen] = useState(false);
            const [isConnecting, setIsConnecting] = useState(false);
            const [isConnected, setIsConnected] = useState(false);
            const [walletProvider, setWalletProvider] = useState(null);
            
            // Form States
            const [email, setEmail] = useState('');
            const [qty, setQty] = useState(1);
            const [manualWallet, setManualWallet] = useState('');
            const [accepted, setAccepted] = useState(false);

            useEffect(() => { lucide.createIcons(); }, [view, step, isWalletModalOpen, isConnecting, searchQuery]);

            const t = TRANSLATIONS[lang];
            const activeWallet = isConnected ? "0x71C7...976F" : manualWallet;
            const total = selected === 'token' ? (qty * TOKEN_UNIT_PRICE) : (selected?.price || 0);

            const filteredCategories = useMemo(() => {
                return CATEGORIES.map(cat => ({
                    ...cat,
                    books: cat.books.filter(book => 
                        book.title.toLowerCase().includes(searchQuery.toLowerCase())
                    )
                })).filter(cat => cat.books.length > 0);
            }, [searchQuery]);

            const handleConnect = (provider) => {
                setIsConnecting(true);
                setWalletProvider(provider);
                setTimeout(() => {
                    setIsConnecting(false);
                    setIsConnected(true);
                    setIsWalletModalOpen(false);
                }, 1200);
            };

            const handlePurchase = () => {
                if (total > 1000) {
                    alert("Maximum purchase per transaction is €1000.00");
                    return;
                }
                const txId = `LXD-POLY-${Math.random().toString(36).substring(2, 12).toUpperCase()}`;
                setCurrentTransactionId(txId);
                setView('status');
                
                const interval = setInterval(() => {
                    setStep(s => {
                        if (s >= 3) { 
                            clearInterval(interval); 
                            // Add to history once delivered
                            const newRecord = {
                                id: txId,
                                date: new Date().toLocaleString(),
                                item: selected === 'token' ? 'Genesis Utility Token' : selected.title,
                                type: selected === 'token' ? 'ERC20' : 'Ebook',
                                qty: selected === 'token' ? qty : 1,
                                amount: total,
                                wallet: selected === 'token' ? (isConnected ? '0x71C7...976F' : manualWallet) : 'n/a',
                                email: email
                            };
                            setPurchaseHistory(prev => [newRecord, ...prev]);
                            return 3; 
                        }
                        return s + 1;
                    });
                }, 2000);
            };

            return (
                <div className="min-h-screen selection:bg-blue-100 overflow-x-hidden">
                    {/* NAV */}
                    <nav className="fixed top-0 w-full z-50 bg-[#0F172A] text-white px-4 md:px-6 py-4 shadow-2xl border-b border-blue-900/30">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => { setView('home'); setStep(0); setSearchQuery(''); }}>
                                <div className="w-9 h-9 md:w-10 md:h-10 bg-blue-600 flex items-center justify-center rounded-lg shadow-lg group-hover:rotate-12 transition-all">
                                    <Icon name="layers" size={20} />
                                </div>
                                <span className="font-serif italic text-xl md:text-2xl tracking-tighter">LuxeDigital</span>
                            </div>
                            <div className="flex items-center gap-3 md:gap-6">
                                <button 
                                    onClick={() => setView('history')}
                                    className="text-[10px] font-bold uppercase tracking-widest text-blue-300/60 hover:text-white transition-colors flex items-center gap-2"
                                >
                                    <Icon name="history" size={14} />
                                    <span className="hidden sm:inline">{t.history}</span>
                                </button>
                                <button 
                                    onClick={() => isConnected ? setIsConnected(false) : setIsWalletModalOpen(true)} 
                                    className="bg-blue-600 hover:bg-blue-500 transition-colors px-4 md:px-6 py-2.5 rounded-lg text-[10px] font-bold uppercase tracking-widest shadow-lg flex items-center gap-2"
                                >
                                    <Icon name="wallet" size={14} />
                                    <span className="hidden sm:inline">{isConnected ? "0x71...976F" : t.connect}</span>
                                    <span className="sm:hidden text-[9px]">{isConnected ? "Connected" : "Wallet"}</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {view === 'home' && (
                        <main className="pt-24 md:pt-32 animate-in fade-in duration-700">
                            {/* HERO */}
                            <section className="max-w-7xl mx-auto px-4 md:px-6 py-12 md:py-20 grid lg:grid-cols-2 gap-12 md:gap-20 items-center">
                                <div className="space-y-6 md:space-y-10 order-2 lg:order-1">
                                    <div className="inline-flex items-center gap-2 bg-blue-50 border border-blue-100 px-3 py-1 rounded-full">
                                        <div className="w-2 h-2 rounded-full bg-blue-600 animate-pulse"></div>
                                        <span className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Live on Polygon Network</span>
                                    </div>
                                    <h1 className="text-5xl md:text-8xl font-serif leading-[1] text-slate-900 tracking-tight">{t.hero}</h1>
                                    <p className="text-lg md:text-xl text-slate-500 font-light leading-relaxed max-w-lg">{t.subHero}</p>
                                    <button onClick={() => { setSelected('token'); setView('checkout'); }} className="bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 rounded-xl font-bold uppercase tracking-widest text-xs flex items-center gap-3 shadow-2xl transition-all hover:-translate-y-1 touch-active">Acquire Genesis Token <Icon name="arrow-right" size={16}/></button>
                                </div>
                                <div className="relative order-1 lg:order-2">
                                    <div className="bg-[#0F172A] p-8 md:p-12 rounded-[2.5rem] md:rounded-[3rem] text-white shadow-2xl relative overflow-hidden group">
                                        <div className="flex justify-between items-start mb-8 md:mb-12">
                                            <div className="w-14 h-14 md:w-16 md:h-16 bg-blue-600/20 border border-blue-500/30 rounded-2xl flex items-center justify-center">
                                                <Icon name="cpu" size={28} className="text-blue-500" />
                                            </div>
                                            <span className="text-[9px] md:text-[10px] font-bold uppercase tracking-widest text-blue-400">Fixed Unit: €12.50</span>
                                        </div>
                                        <h3 className="text-3xl md:text-4xl font-serif mb-6">{t.tokenTitle}</h3>
                                        <div className="space-y-4 md:space-y-5 text-blue-300 font-light text-sm">
                                            <p className="flex items-center gap-3"><Icon name="shield-check" size={18} className="text-blue-500"/> Verified ERC20 Protocol</p>
                                            <p className="flex items-center gap-3"><Icon name="zap" size={18} className="text-blue-500"/> Instant Institutional Allocation</p>
                                            <p className="flex items-center gap-3"><Icon name="globe" size={18} className="text-blue-500"/> High-Frequency Polygon Settlement</p>
                                        </div>
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-blue-600/5 rounded-full blur-[80px] -translate-y-1/2 translate-x-1/2"></div>
                                    </div>
                                </div>
                            </section>

                            {/* DIGITAL LIBRARY */}
                            <section className="bg-white py-16 md:py-24 border-y border-slate-100">
                                <div className="max-w-7xl mx-auto px-4 md:px-6">
                                    <div className="flex flex-col md:flex-row md:items-end justify-between mb-12 md:mb-16 gap-8">
                                        <div className="space-y-4">
                                            <h3 className="text-[11px] font-bold uppercase tracking-[0.4em] text-blue-600">Global Repository</h3>
                                            <h2 className="text-3xl md:text-4xl font-serif text-slate-900 leading-tight">Digital Literature Catalog</h2>
                                        </div>
                                        <div className="relative w-full md:w-96 group">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-600 transition-colors"><Icon name="search" size={18} /></div>
                                            <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search digital assets..." className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-600/20 focus:bg-white rounded-2xl py-4 pl-12 pr-6 outline-none transition-all text-sm font-medium" />
                                        </div>
                                    </div>

                                    {filteredCategories.map(cat => (
                                        <div key={cat.id} className="mb-16 md:mb-20 last:mb-0">
                                            <div className="flex items-center gap-4 mb-8 md:mb-10">
                                                <span className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 whitespace-nowrap">{cat.name}</span>
                                                <div className="w-full h-[1px] bg-slate-100"></div>
                                            </div>
                                            <div className="flex gap-6 md:gap-10 overflow-x-auto pb-8 md:pb-10 no-scrollbar snap-x">
                                                {cat.books.map(book => (
                                                    <div key={book.id} onClick={() => { setSelected(book); setView('checkout'); }} className="flex-shrink-0 w-64 md:w-80 group cursor-pointer snap-start touch-active">
                                                        <div className="aspect-[3/4] rounded-2xl md:rounded-3xl overflow-hidden mb-6 md:mb-8 shadow-xl relative bg-slate-200">
                                                            <SafeImage src={book.image} alt={book.title} title={book.title} />
                                                            <div className="absolute inset-0 image-overlay opacity-80 transition-opacity group-hover:opacity-90"></div>
                                                            <div className="absolute bottom-6 left-6 right-6">
                                                                <span className="text-[9px] bg-blue-600 text-white px-3 py-1 rounded-full font-bold uppercase tracking-widest mb-3 inline-block">{book.tag}</span>
                                                                <h4 className="font-serif italic text-xl text-white mb-2 leading-tight">{book.title}</h4>
                                                                <p className="font-mono text-blue-400 font-bold text-sm">€{book.price.toFixed(2)}</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </main>
                    )}

                    {view === 'checkout' && (
                        <main className="pt-28 md:pt-32 pb-24 max-w-6xl mx-auto px-4 md:px-6 animate-fade-in">
                            <button onClick={() => setView('home')} className="flex items-center gap-2 text-[10px] font-bold text-slate-400 hover:text-blue-600 mb-8 md:mb-12 uppercase tracking-widest transition-colors"><Icon name="arrow-left" size={14}/> {t.back}</button>
                            <div className="grid lg:grid-cols-12 gap-12 lg:gap-20">
                                <div className="lg:col-span-7 space-y-10 md:space-y-16">
                                    <div className="space-y-4">
                                        <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-blue-600">Secure Acquisition</span>
                                        <h2 className="text-4xl md:text-6xl font-serif text-slate-900 leading-tight">{selected === 'token' ? t.tokenTitle : selected.title}</h2>
                                    </div>
                                    <div className="space-y-10 md:space-y-12 pt-8 md:pt-12 border-t border-slate-100">
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-bold uppercase text-slate-500 tracking-widest">Email Identity</label>
                                            <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-transparent border-b-2 border-slate-100 py-4 md:py-6 outline-none focus:border-blue-600 text-2xl md:text-3xl font-light placeholder:text-slate-200" placeholder="curator@example.com" />
                                        </div>
                                        {selected === 'token' && (
                                            <div className="grid md:grid-cols-2 gap-8 md:gap-12">
                                                <div className="space-y-4">
                                                    <label className="text-[10px] font-bold uppercase text-slate-500 tracking-widest">Quantity</label>
                                                    <input type="number" min="1" value={qty} onChange={e => setQty(Math.max(1, parseInt(e.target.value) || 1))} className="w-full bg-transparent border-b-2 border-slate-100 py-4 outline-none focus:border-blue-600 text-3xl md:text-4xl font-mono text-blue-900" />
                                                </div>
                                                <div className="space-y-4">
                                                    <label className="text-[10px] font-bold uppercase text-slate-500 tracking-widest">Network</label>
                                                    <div className="py-4 md:py-6 border-b-2 border-slate-100 flex items-center justify-between">
                                                        <span className="text-lg font-mono text-slate-300">Polygon L2</span>
                                                        <div className="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        <div className="space-y-6">
                                            <label className="text-[10px] font-bold uppercase text-slate-500 tracking-widest">Polygon Destination</label>
                                            {!isConnected ? (
                                                <div className="flex flex-col gap-4">
                                                    <button onClick={() => setIsWalletModalOpen(true)} className="w-full border-2 border-blue-50 bg-white py-5 rounded-2xl flex items-center justify-center gap-4 text-xs font-bold hover:bg-blue-50 transition-all text-blue-900 shadow-sm touch-active"><Icon name="wallet" size={18} /> {t.connect}</button>
                                                    <input type="text" value={manualWallet} onChange={e => setManualWallet(e.target.value)} className="w-full border-2 border-slate-50 rounded-2xl px-6 py-5 outline-none focus:border-blue-600 text-xs font-mono shadow-sm bg-white" placeholder="Manual address (0x...)" />
                                                </div>
                                            ) : (
                                                <div className="p-6 md:p-8 bg-blue-50 rounded-3xl border border-blue-100 flex items-center justify-between shadow-inner">
                                                    <div className="flex items-center gap-4">
                                                        <Icon name="shield-check" size={24} className="text-blue-600" />
                                                        <div className="overflow-hidden">
                                                            <p className="text-[9px] font-bold text-blue-400 uppercase mb-1">Signed via {walletProvider}</p>
                                                            <p className="font-mono text-sm md:text-xl text-blue-900 truncate">0x71C7656EC7ab88b098defB751B7401B5f6d8976F</p>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => setIsConnected(false)} className="text-[10px] font-bold uppercase text-blue-400 hover:text-red-500 whitespace-nowrap">Change</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="lg:col-span-5">
                                    <div className="sticky top-28 bg-white p-8 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] shadow-xl border border-blue-50 space-y-10">
                                        <h3 className="text-2xl font-serif italic border-b pb-8 text-slate-900">Valuation</h3>
                                        <div className="space-y-4">
                                            <div className="flex justify-between text-sm"><span className="text-slate-400">Inventory</span><span className="font-mono font-bold">€{total.toFixed(2)}</span></div>
                                            <div className="flex justify-between text-sm"><span className="text-slate-400">Gas & Settlement</span><span className="text-green-600 font-bold uppercase text-[10px]">Sponsored</span></div>
                                            <div className="pt-8 border-t border-blue-50 flex justify-between items-end"><span className="text-xl font-serif italic text-slate-900">Total</span><span className="text-4xl font-light text-blue-600 tracking-tighter">€{total.toFixed(2)}</span></div>
                                        </div>
                                        <div className="space-y-8">
                                            <label className="flex gap-4 cursor-pointer group">
                                                <input type="checkbox" checked={accepted} onChange={e => setAccepted(e.target.checked)} className="mt-1 w-6 h-6 border-slate-200 rounded-lg text-blue-600 focus:ring-0" />
                                                <span className="text-[11px] text-slate-400 leading-relaxed group-hover:text-slate-500 transition-colors">{t.terms}</span>
                                            </label>
                                            <button onClick={handlePurchase} disabled={!accepted || !email || (!isConnected && !manualWallet)} className="w-full bg-[#0F172A] hover:bg-blue-600 text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] text-[10px] disabled:opacity-20 shadow-2xl transition-all touch-active">Confirm Acquisition</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {view === 'status' && (
                        <main className="pt-40 md:pt-48 pb-24 px-4 animate-fade-in">
                            <div className="max-w-2xl mx-auto text-center">
                                {step < 3 ? (
                                    <div className="space-y-12">
                                        <div className="flex justify-center relative">
                                            <div className="w-36 h-36 md:w-48 md:h-48 rounded-full flex items-center justify-center bg-blue-50">
                                                <Icon name="refresh-ccw" size={40} className="text-blue-600 animate-spin" />
                                            </div>
                                        </div>
                                        <h2 className="text-4xl md:text-5xl font-serif italic text-slate-900">{t.status[step]}</h2>
                                        <div className="grid grid-cols-4 gap-3 max-w-sm mx-auto">
                                            {[0, 1, 2, 3].map(i => <div key={i} className={`h-1.5 rounded-full transition-all duration-700 ${i <= step ? 'bg-blue-600 shadow-lg' : 'bg-slate-100'}`}></div>)}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-12 animate-fade-in">
                                        {/* THE BILL / RECEIPT */}
                                        <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-2xl border-t-8 border-blue-600 text-left relative overflow-hidden">
                                            <div className="absolute top-0 right-0 p-8 opacity-10"><Icon name="layers" size={120} /></div>
                                            
                                            <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12 border-b pb-8">
                                                <div>
                                                    <h3 className="text-3xl font-serif italic text-blue-900">Proof of Acquisition</h3>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Deterministic Digital Receipt</p>
                                                </div>
                                                <div className="text-left md:text-right">
                                                    <p className="text-[10px] font-bold text-slate-500 uppercase">Order Ref</p>
                                                    <p className="font-mono text-xs text-blue-600">{currentTransactionId}</p>
                                                </div>
                                            </header>

                                            <div className="grid md:grid-cols-2 gap-12 mb-12">
                                                <div className="space-y-6">
                                                    <div>
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Entity for Delivery</p>
                                                        <p className="text-sm font-medium">{email}</p>
                                                    </div>
                                                    {selected === 'token' && (
                                                        <div>
                                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Polygon Destination</p>
                                                            <p className="text-xs font-mono break-all text-blue-900 bg-blue-50 p-2 rounded">0x71C7656EC7ab88b098defB751B7401B5f6d8976F</p>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="space-y-6">
                                                    <div>
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Acquisition Date</p>
                                                        <p className="text-sm font-medium">{new Date().toLocaleString()}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Status</p>
                                                        <span className="inline-flex items-center gap-2 text-green-600 text-[10px] font-bold uppercase border border-green-200 bg-green-50 px-3 py-1 rounded-full">✓ Fulfilled & Dispatched</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="receipt-border p-6 rounded-2xl space-y-4 mb-8">
                                                <div className="flex justify-between items-center text-sm">
                                                    <span className="text-slate-500 font-medium">{selected === 'token' ? 'Genesis Utility Token' : selected.title} (x{selected === 'token' ? qty : 1})</span>
                                                    <span className="font-mono font-bold">€{total.toFixed(2)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-xs">
                                                    <span className="text-slate-400 italic">Polygon L2 Network Gas Fee</span>
                                                    <span className="text-green-600 font-bold uppercase text-[9px]">Sponsored by Protocol</span>
                                                </div>
                                                <div className="pt-4 border-t-2 border-slate-100 flex justify-between items-baseline">
                                                    <span className="text-lg font-serif italic text-slate-900">Total Settlement</span>
                                                    <span className="text-4xl font-light text-blue-600 tracking-tighter">€{total.toFixed(2)}</span>
                                                </div>
                                            </div>

                                            <footer className="text-center opacity-30">
                                                <p className="text-[9px] font-mono uppercase tracking-[0.5em]">LuxeDigital Institutional Ledger - 2026</p>
                                            </footer>
                                        </div>

                                        <div className="flex flex-col sm:flex-row justify-center gap-4">
                                            <button 
                                                onClick={() => window.print()}
                                                className="px-8 py-4 border-2 border-slate-200 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center justify-center gap-2"
                                            >
                                                <Icon name="printer" size={14} /> Download Bill
                                            </button>
                                            <button 
                                                onClick={() => window.location.reload()} 
                                                className="bg-[#0F172A] hover:bg-blue-600 text-white px-10 py-4 rounded-xl font-bold uppercase text-[10px] tracking-[0.2em] transition-all touch-active"
                                            >
                                                Return to Ecosystem
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </main>
                    )}

                    {view === 'history' && (
                        <main className="pt-32 pb-24 max-w-4xl mx-auto px-4 md:px-6 animate-fade-in">
                            <header className="flex justify-between items-end mb-12 border-b pb-8">
                                <div className="space-y-2">
                                    <h3 className="text-[11px] font-bold uppercase tracking-[0.4em] text-blue-600">Vault Access</h3>
                                    <h2 className="text-4xl font-serif text-slate-900">Acquisition History</h2>
                                </div>
                                <button onClick={() => setView('home')} className="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-colors">{t.back} Home</button>
                            </header>

                            {purchaseHistory.length > 0 ? (
                                <div className="space-y-6">
                                    {purchaseHistory.map(record => (
                                        <div key={record.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between gap-6 group hover:shadow-md transition-all">
                                            <div className="flex gap-6 items-start">
                                                <div className="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center border border-blue-100 shrink-0">
                                                    <Icon name={record.type === 'ERC20' ? 'cpu' : 'book'} size={24} className="text-blue-600" />
                                                </div>
                                                <div className="space-y-1">
                                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{record.date}</p>
                                                    <h4 className="font-serif italic text-lg leading-tight text-slate-900">{record.item}</h4>
                                                    <p className="text-xs text-blue-500 font-mono">{record.id}</p>
                                                </div>
                                            </div>
                                            <div className="flex flex-row md:flex-col justify-between items-end md:text-right gap-2 border-t md:border-t-0 pt-4 md:pt-0">
                                                <div className="text-left md:text-right">
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Settlement</p>
                                                    <p className="font-mono font-bold text-blue-900 text-lg">€{record.amount.toFixed(2)}</p>
                                                </div>
                                                <span className="text-[9px] font-bold uppercase text-green-600 bg-green-50 px-3 py-1 rounded-full border border-green-100">Fulfilled</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-24 bg-white rounded-3xl border-2 border-dashed border-slate-100">
                                    <Icon name="archive" size={48} className="text-slate-200 mx-auto mb-4" />
                                    <p className="text-slate-400 font-medium text-sm tracking-wide">{t.noHistory}</p>
                                </div>
                            )}
                        </main>
                    )}

                    {/* WALLET MODAL */}
                    {isWalletModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-[#0F172A]/90 backdrop-blur-xl flex items-end sm:items-center justify-center p-0 sm:p-6 animate-fade-in">
                            <div className="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[3.5rem] p-8 md:p-16 space-y-12 shadow-2xl relative border border-blue-50">
                                <button onClick={() => setIsWalletModalOpen(false)} className="absolute top-10 right-10 text-slate-300 hover:text-black transition-colors"><Icon name="x" size={24} /></button>
                                <div className="space-y-4">
                                    <h3 className="text-3xl md:text-4xl font-serif italic text-slate-900">Protocol Link</h3>
                                    <p className="text-slate-500 font-light text-sm">Select your digital identity interface.</p>
                                </div>
                                <div className="space-y-4">
                                    {['MetaMask', 'WalletConnect', 'Coinbase'].map(name => (
                                        <button key={name} disabled={isConnecting} onClick={() => handleConnect(name)} className="w-full flex items-center justify-between p-8 border-2 border-slate-50 rounded-[2rem] hover:bg-blue-50 transition-all text-left disabled:opacity-50 touch-active">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center"><Icon name="link" size={18} className="text-slate-400" /></div>
                                                <span className="font-bold text-[10px] md:text-xs uppercase tracking-widest text-slate-700">{name}</span>
                                            </div>
                                            <Icon name="chevron-right" size={18} className="text-slate-200" />
                                        </button>
                                    ))}
                                </div>
                                {isConnecting && (
                                    <div className="absolute inset-0 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center gap-6 animate-fade-in">
                                        <Icon name="refresh-ccw" size={40} className="text-blue-600 animate-spin" />
                                        <p className="text-[10px] font-bold uppercase tracking-[0.4em] text-blue-900">Waiting for Signature...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <footer className="bg-[#0F172A] text-white py-16 md:py-32 px-4 md:px-6 mt-20 relative overflow-hidden">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-16 md:gap-20 relative z-10 text-center md:text-left">
                            <div className="md:col-span-2 space-y-8">
                                <div className="flex items-center justify-center md:justify-start gap-3">
                                    <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(37,99,235,0.4)]"><Icon name="layers" size={16}/></div>
                                    <span className="font-serif italic text-2xl">LuxeDigital</span>
                                </div>
                                <p className="text-blue-200/30 text-sm font-light max-w-md mx-auto md:mx-0 leading-relaxed">Institutional digital asset issuance on the Polygon Network. Compliant, safe, and immutable delivery guaranteed.</p>
                                <div className="space-y-1 pt-4">
                                    <p className="text-[10px] font-bold uppercase tracking-[0.4em] text-blue-500/80">Developed by Amit N</p>
                                    <p className="text-[9px] font-mono text-blue-900 uppercase">Version 4.4.0-PRO</p>
                                </div>
                            </div>
                            <div className="space-y-6 text-slate-400">
                                <h4 className="text-[11px] font-bold uppercase tracking-[0.4em] text-blue-400">Governance</h4>
                                <ul className="space-y-3 text-[10px] font-bold uppercase tracking-widest text-blue-100/30">
                                    <li className="hover:text-blue-400 cursor-pointer">Acquisition Terms</li>
                                    <li className="hover:text-blue-400 cursor-pointer">Sovereignty Audit</li>
                                    <li className="hover:text-blue-400 cursor-pointer text-blue-600">Protocol v4.4</li>
                                </ul>
                            </div>
                            <div className="space-y-6">
                                <h4 className="text-[11px] font-bold uppercase tracking-[0.4em] text-blue-400">Ledger</h4>
                                <div className="flex items-center justify-center md:justify-start gap-3 text-green-400 bg-green-400/5 px-4 py-2 rounded-lg border border-green-400/10 w-fit mx-auto md:mx-0">
                                    <div className="w-2 h-2 rounded-full bg-green-400 animate-pulse shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div> 
                                    <span className="text-[10px] uppercase font-bold tracking-widest">Polygon Online</span>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto pt-16 md:pt-24 border-t border-white/5 mt-10 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] md:text-[11px] font-bold uppercase tracking-[0.6em] text-blue-100/10">
                            <span>&copy; 2026 LuxeDigital Protocol</span>
                            <div className="flex gap-4 md:gap-8">
                                <span>Paris</span>
                                <span>London</span>
                                <span>Frankfurt</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
