<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeDigital | Institutional Digital Assets</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.7s ease-out forwards; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }
        .touch-active:active { transform: scale(0.98); }
        .image-overlay { background: linear-gradient(to top, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.2) 50%, transparent 100%); }
        .receipt-border { border: 2px dashed #E2E8F0; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- UI Components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SafeImage = ({ src, alt, title }) => {
            const [error, setError] = useState(false);
            if (error || !src) {
                return (
                    <div className="w-full h-full bg-gradient-to-br from-blue-900 to-blue-700 flex flex-col items-center justify-center p-8 text-center">
                        <Icon name="book-open" size={48} className="text-blue-400/50 mb-4" />
                        <span className="font-serif italic text-white/90 text-lg leading-tight">{title}</span>
                    </div>
                );
            }
            return (
                <img 
                    src={src} 
                    alt={alt} 
                    className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
                    onError={() => setError(true)}
                />
            );
        };

        // --- DATA ---
        const TOKEN_UNIT_PRICE = 12.50;
        const REWARD_AMOUNT = 1.00;
        const NETWORK_NAME = "Polygon Mainnet";

        const CATEGORIES = [
            {
                id: 'cat-1',
                name: 'Global Bestsellers',
                books: [
                    { id: 'eb-01', title: 'The Bitcoin Standard', price: 29.00, tag: 'Bestseller', image: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?q=80&w=800&auto=format&fit=crop' },
                    { id: 'eb-02', title: 'Mastering Bitcoin', price: 39.00, tag: 'Technical', image: 'https://images.unsplash.com/photo-1621416848446-9f6efdec403d?q=80&w=800&auto=format&fit=crop' },
                    { id: 'eb-03', title: 'Blockchain Revolution', price: 35.00, tag: 'Essential', image: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=800&auto=format&fit=crop' }
                ]
            },
            {
                id: 'cat-2',
                name: 'Strategic Assets',
                books: [
                    { id: 'eb-04', title: 'Digital Gold', price: 45.00, tag: 'Recommended', image: 'https://images.unsplash.com/photo-1620321023374-d1a68fbc720d?q=80&w=800&auto=format&fit=crop' },
                    { id: 'eb-05', title: 'The Infinite Machine', price: 55.00, tag: 'New Release', image: 'https://images.unsplash.com/photo-1640341719942-0268302abc0a?q=80&w=800&auto=format&fit=crop' },
                    { id: 'eb-06', title: 'Layer 2 Economics', price: 32.00, tag: 'Advanced', image: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=800&auto=format&fit=crop' }
                ]
            }
        ];

        const TRANSLATIONS = {
            EN: {
                hero: "Institutional Digital Assets.",
                subHero: "Secure acquisition of Genesis ERC20 tokens and curated digital literature. Built on Polygon, designed for the high-end European economy.",
                tokenTitle: "Genesis Utility Token",
                buyNow: "Confirm Acquisition",
                email: "Delivery Email",
                wallet: "Polygon Destination",
                terms: "I acknowledge that transfers on the Polygon Network are irreversible and non-refundable upon delivery.",
                status: ["Web3 Handshake...", "Verifying Payment", "Broadcasting to Polygon", "Asset Dispatched"],
                connect: "Connect Wallet",
                history: "Vault",
                back: "Back",
                readNow: "Study Literature",
                claimReward: "Claim 1.00 GEN Reward",
                rewardPending: "Allocating Learning Reward...",
                rewardSuccess: "Reward Credited to Vault",
                acquireBtn: "Acquire Now",
                readBtn: "Read & Earn",
                searchPlaceholder: "Search repository..."
            },
            FR: {
                hero: "Actifs Numériques Institutionnels.",
                subHero: "Acquisition sécurisée de jetons Genesis ERC20 et littérature numérique. Conçu sur Polygon pour l'économie européenne haut de gamme.",
                tokenTitle: "Jeton Utilitaire Genesis",
                buyNow: "Confirmer l'Acquisition",
                email: "Email de Livraison",
                wallet: "Destination Polygon",
                terms: "Je reconnais que les transferts sur le réseau Polygon sont irréversibles et non remboursables.",
                status: ["Signature Web3...", "Vérification", "Diffusion sur Polygon", "Actif Envoyé"],
                connect: "Connecter",
                history: "Coffre",
                back: "Retour",
                readNow: "Étudier",
                claimReward: "Réclamer 1.00 GEN",
                rewardPending: "Allocation de Récompense...",
                rewardSuccess: "Récompense Créditée",
                acquireBtn: "Acquérir",
                readBtn: "Lire & Gagner",
                searchPlaceholder: "Rechercher..."
            },
            PT: {
                hero: "Ativos Digitais Institucionais.",
                subHero: "Aquisição segura de tokens Genesis ERC20 e literatura digital curada. Construído na Polygon para a economia europeia premium.",
                tokenTitle: "Token de Utilidade Genesis",
                buyNow: "Confirmar Aquisição",
                email: "E-mail de Entrega",
                wallet: "Destino Polygon",
                terms: "Reconheço que as transferências na Rede Polygon são irreversíveis e não reembolsáveis após a entrega.",
                status: ["Assinatura Web3...", "Verificando Pagamento", "Transmitindo na Polygon", "Ativo Despachado"],
                connect: "Conectar Carteira",
                history: "Cofre",
                back: "Voltar",
                readNow: "Estudar Literatura",
                claimReward: "Resgatar 1.00 GEN",
                rewardPending: "Alocando Recompensa...",
                rewardSuccess: "Recompensa Creditada",
                acquireBtn: "Adquirir Agora",
                readBtn: "Ler & Ganhar",
                searchPlaceholder: "Pesquisar no repositório..."
            },
            ES: {
                hero: "Activos Digitales Institucionales.",
                subHero: "Adquisición segura de tokens Genesis ERC20 y literatura digital seleccionada. Construido en Polygon para la economía europea premium.",
                tokenTitle: "Token de Utilidad Genesis",
                buyNow: "Confirmar Adquisición",
                email: "Email de Entrega",
                wallet: "Destino Polygon",
                terms: "Reconozco que las transferencias en la Red Polygon son irreversibles y no reembolsables tras la entrega.",
                status: ["Firma Web3...", "Verificando Pago", "Transmitiendo en Polygon", "Activo Despachado"],
                connect: "Conectar Cartera",
                history: "Bóveda",
                back: "Atrás",
                readNow: "Estudiar Literatura",
                claimReward: "Reclamar 1.00 GEN",
                rewardPending: "Asignando Recompensa...",
                rewardSuccess: "Recompensa Acreditada",
                acquireBtn: "Adquirir Ahora",
                readBtn: "Leer & Ganar",
                searchPlaceholder: "Buscar en la biblioteca..."
            },
            DE: {
                hero: "Institutionelle digitale Assets.",
                subHero: "Sicherer Erwerb von Genesis ERC20-Token und kuratierter digitaler Literatur. Gebaut auf Polygon für die europäische Wirtschaft.",
                tokenTitle: "Genesis Utility Token",
                buyNow: "Erwerb bestätigen",
                email: "Liefer-E-Mail",
                wallet: "Polygon Zieladresse",
                terms: "Ich bestätige, dass Übertragungen im Polygon-Netzwerk unwiderruflich sind und nach der Lieferung nicht erstattet werden können.",
                status: ["Web3 Handshake...", "Zahlung wird geprüft", "Polygon Übertragung", "Asset versendet"],
                connect: "Wallet verbinden",
                history: "Tresor",
                back: "Zurück",
                readNow: "Literatur studieren",
                claimReward: "1.00 GEN Belohnung",
                rewardPending: "Belohnung wird zugewiesen...",
                rewardSuccess: "Belohnung gutgeschrieben",
                acquireBtn: "Jetzt erwerben",
                readBtn: "Lesen & Verdienen",
                searchPlaceholder: "Bibliothek durchsuchen..."
            },
            IT: {
                hero: "Asset Digitali Istituzionali.",
                subHero: "Acquisizione sicura di token Genesis ERC20 e letteratura digitale curata. Costruito su Polygon per l'economia europea premium.",
                tokenTitle: "Token di Utilità Genesis",
                buyNow: "Conferma Acquisizione",
                email: "Email di Consegna",
                wallet: "Destinazione Polygon",
                terms: "Riconosco che i trasferimenti sulla rete Polygon sono irreversibili e non rimborsabili dopo la consegna.",
                status: ["Firma Web3...", "Verifica Pagamento", "Trasmissione su Polygon", "Asset Inviato"],
                connect: "Connetti Wallet",
                history: "Caveau",
                back: "Indietro",
                readNow: "Studia Letteratura",
                claimReward: "Riscatta 1.00 GEN",
                rewardPending: "Assegnazione Premio...",
                rewardSuccess: "Premio Accreditato",
                acquireBtn: "Acquista Ora",
                readBtn: "Leggi & Guadagna",
                searchPlaceholder: "Cerca nella biblioteca..."
            }
        };

        function App() {
            const [lang, setLang] = useState('EN');
            const [view, setView] = useState('home'); 
            const [selected, setSelected] = useState(null);
            const [step, setStep] = useState(0);
            const [searchQuery, setSearchQuery] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('card');
            
            const [purchaseHistory, setPurchaseHistory] = useState(() => {
                const saved = localStorage.getItem('lxd_history_v5');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('lxd_history_v5', JSON.stringify(purchaseHistory));
            }, [purchaseHistory]);

            const earnedBalance = useMemo(() => {
                return purchaseHistory.reduce((acc, curr) => curr.isReward ? acc + curr.qty : acc, 0);
            }, [purchaseHistory]);

            const [discoveryBook, setDiscoveryBook] = useState(null);
            const [discoveryPage, setDiscoveryPage] = useState(1);
            const [rewardState, setRewardState] = useState(0); 

            const [currentTransactionId, setCurrentTransactionId] = useState('');
            const [historyItemDetail, setHistoryItemDetail] = useState(null);
            const [isWalletModalOpen, setIsWalletModalOpen] = useState(false);
            const [isConnecting, setIsConnecting] = useState(false);
            const [isConnected, setIsConnected] = useState(false);
            const [walletProvider, setWalletProvider] = useState(null);
            
            const [email, setEmail] = useState('');
            const [qty, setQty] = useState(1);
            const [manualWallet, setManualWallet] = useState('');
            const [accepted, setAccepted] = useState(false);

            useEffect(() => { lucide.createIcons(); }, [view, step, isWalletModalOpen, isConnecting, searchQuery, historyItemDetail, paymentMethod, discoveryBook, discoveryPage, rewardState, lang]);

            const t = TRANSLATIONS[lang];
            const total = selected === 'token' ? (qty * TOKEN_UNIT_PRICE) : (selected?.price || 0);

            const filteredCategories = useMemo(() => {
                return CATEGORIES.map(cat => ({
                    ...cat,
                    books: cat.books.filter(book => 
                        book.title.toLowerCase().includes(searchQuery.toLowerCase())
                    )
                })).filter(cat => cat.books.length > 0);
            }, [searchQuery]);

            const handleConnect = (provider) => {
                setIsConnecting(true);
                setWalletProvider(provider);
                setTimeout(() => {
                    setIsConnecting(false);
                    setIsConnected(true);
                    setIsWalletModalOpen(false);
                }, 1200);
            };

            const handleDiscoveryClick = (book) => {
                setDiscoveryBook(book);
                setDiscoveryPage(1);
                setRewardState(0);
                setTimeout(() => {
                    document.getElementById('discovery-reader')?.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            };

            const handleFinalPurchase = () => {
                const txId = `LXD-POLY-${Math.random().toString(36).substring(2, 12).toUpperCase()}`;
                setCurrentTransactionId(txId);
                setView('status');
                
                const interval = setInterval(() => {
                    setStep(s => {
                        if (s >= 3) { 
                            clearInterval(interval); 
                            const newRecord = {
                                id: txId,
                                date: new Date().toLocaleString(),
                                item: selected === 'token' ? 'Genesis Utility Token' : selected.title,
                                type: selected === 'token' ? 'ERC20' : 'Ebook',
                                qty: selected === 'token' ? qty : 1,
                                amount: total,
                                wallet: selected === 'token' ? (isConnected ? '0x71C7...976F' : (manualWallet || '0x...')) : 'n/a',
                                email: email
                            };
                            setPurchaseHistory(prev => [newRecord, ...prev]);
                            return 3; 
                        }
                        return s + 1;
                    });
                }, 1800);
            };

            const claimDiscoveryReward = () => {
                setRewardState(1);
                setTimeout(() => setRewardState(2), 2000);
                setTimeout(() => {
                    const tx = `LXD-EARN-${Math.random().toString(36).substring(2, 8).toUpperCase()}`;
                    const rewardRecord = {
                        id: tx,
                        date: new Date().toLocaleString(),
                        item: `Reward: ${discoveryBook.title}`,
                        type: 'ERC20',
                        qty: REWARD_AMOUNT,
                        amount: 0,
                        isReward: true,
                        email: email || "institutional-learner@protocol.io"
                    };
                    setPurchaseHistory(prev => [rewardRecord, ...prev]);
                    setRewardState(3);
                }, 3500);
            };

            const DigitalReceipt = ({ data, onBack }) => (
                <div className="space-y-12 animate-fade-in max-w-2xl mx-auto py-8 text-left">
                    <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-2xl border-t-8 border-blue-600 relative overflow-hidden">
                        <header className="flex justify-between items-center mb-12 border-b pb-8">
                            <div><h3 className="text-3xl font-serif italic text-blue-900">Proof of Acquisition</h3><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Digital Certificate</p></div>
                            <div className="text-right"><p className="text-[10px] font-bold text-slate-500 uppercase">Ref</p><p className="font-mono text-xs text-blue-600">{data.id}</p></div>
                        </header>
                        <div className="grid grid-cols-2 gap-8 mb-10 text-sm">
                            <div><p className="text-[10px] font-bold uppercase text-slate-400 mb-1">Entity</p><p>{data.email || 'Anonymous'}</p></div>
                            <div><p className="text-[10px] font-bold uppercase text-slate-400 mb-1">Timestamp</p><p>{data.date}</p></div>
                        </div>
                        <div className="receipt-border p-6 rounded-2xl space-y-4 mb-8">
                            <div className="flex justify-between text-sm"><span className="text-slate-500">{data.item}</span><span className="font-mono font-bold">€{data.amount.toFixed(2)}</span></div>
                            <div className="pt-4 border-t-2 border-slate-50 flex justify-between items-baseline"><span className="text-lg font-serif italic">Total Settlement</span><span className="text-4xl font-light text-blue-600">€{data.amount.toFixed(2)}</span></div>
                        </div>
                        <footer className="text-center opacity-30 text-[9px] font-mono uppercase tracking-[0.4em]">LuxeDigital Institutional Ledger - 2026</footer>
                    </div>
                    <button onClick={onBack} className="bg-[#0F172A] text-white px-10 py-4 rounded-xl font-bold uppercase text-[10px] tracking-[0.2em] transition-all no-print mx-auto block">Return to Ecosystem</button>
                </div>
            );

            return (
                <div className="min-h-screen selection:bg-blue-100 overflow-x-hidden">
                    {/* NAV */}
                    <nav className="fixed top-0 w-full z-50 bg-[#0F172A] text-white px-4 md:px-6 py-4 shadow-2xl border-b border-blue-900/30 no-print">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => { setView('home'); setDiscoveryBook(null); }}>
                                <div className="w-10 h-10 bg-blue-600 flex items-center justify-center rounded-lg shadow-lg group-hover:rotate-12 transition-all"><Icon name="layers" size={20} /></div>
                                <span className="font-serif italic text-2xl tracking-tighter">LuxeDigital</span>
                            </div>
                            
                            <div className="flex items-center gap-4 md:gap-8">
                                <div className="flex items-center gap-1 border border-blue-800 rounded-full px-2 py-1 bg-blue-900/40">
                                    <Icon name="globe" size={12} className="text-blue-400" />
                                    <select value={lang} onChange={e => setLang(e.target.value)} className="bg-transparent text-[10px] font-bold outline-none cursor-pointer border-none p-0">
                                        <option value="EN" className="text-black">EN</option>
                                        <option value="FR" className="text-black">FR</option>
                                        <option value="PT" className="text-black">PT</option>
                                        <option value="ES" className="text-black">ES</option>
                                        <option value="DE" className="text-black">DE</option>
                                        <option value="IT" className="text-black">IT</option>
                                    </select>
                                </div>
                                <button onClick={() => { setView('history'); setDiscoveryBook(null); }} className="text-[10px] font-bold uppercase tracking-widest text-blue-300/60 hover:text-white flex items-center gap-2"><Icon name="box" size={14} />{t.history}</button>
                                <button onClick={() => isConnected ? setIsConnected(false) : setIsWalletModalOpen(true)} className="bg-blue-600 px-6 py-2.5 rounded-lg text-[10px] font-bold uppercase tracking-widest shadow-lg flex items-center gap-2"><Icon name="wallet" size={14} />{isConnected ? "Linked" : t.connect}</button>
                            </div>
                        </div>
                    </nav>

                    {view === 'home' && (
                        <main className="pt-24 md:pt-32 animate-fade-in text-left">
                            {/* HERO */}
                            <section className="max-w-7xl mx-auto px-4 md:px-6 py-12 md:py-20 grid lg:grid-cols-2 gap-20 items-center">
                                <div className="space-y-10">
                                    <div className="inline-flex items-center gap-2 bg-blue-600/10 border border-blue-600/20 px-4 py-2 rounded-full">
                                        <Icon name="book-open" size={14} className="text-blue-600" />
                                        <span className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Multi-Language Discovery Interface — v4.9.0</span>
                                    </div>
                                    <h1 className="text-6xl md:text-8xl font-serif text-slate-900 tracking-tight leading-[0.95]">{t.hero}</h1>
                                    <p className="text-xl text-slate-500 font-light leading-relaxed max-w-lg">{t.subHero}</p>
                                    <button onClick={() => { setSelected('token'); setView('checkout'); }} className="bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 rounded-xl font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-3 shadow-2xl transition-all hover:-translate-y-1">{t.acquireBtn} Genesis Token <Icon name="arrow-right" size={16}/></button>
                                </div>
                                <div className="relative">
                                    <div className="bg-[#0F172A] p-12 rounded-[3rem] text-white shadow-2xl relative overflow-hidden group">
                                        <div className="flex justify-between items-start mb-12">
                                            <div className="w-16 h-16 bg-blue-600/20 border border-blue-500/30 rounded-2xl flex items-center justify-center"><Icon name="cpu" size={32} className="text-blue-500" /></div>
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-blue-400">Institutional Settle</span>
                                        </div>
                                        <h3 className="text-4xl font-serif mb-6">{t.tokenTitle}</h3>
                                        <div className="space-y-4 text-blue-300 font-light text-sm">
                                            <p className="flex items-center gap-3"><Icon name="shield-check" size={18} className="text-blue-500"/> Verified ERC20 Protocol</p>
                                            <p className="flex items-center gap-3"><Icon name="sparkles" size={18} className="text-blue-500"/> Discovery Incentives Enabled</p>
                                        </div>
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-blue-600/5 rounded-full blur-[80px] -translate-y-1/2 translate-x-1/2"></div>
                                    </div>
                                </div>
                            </section>

                            {/* DIGITAL LIBRARY */}
                            <section className="bg-white py-24 border-y border-slate-100">
                                <div className="max-w-7xl mx-auto px-4 md:px-6">
                                    <div className="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8 text-left">
                                        <div className="space-y-4">
                                            <h3 className="text-[11px] font-bold uppercase tracking-[0.4em] text-blue-600">The Catalog</h3>
                                            <h2 className="text-4xl font-serif text-slate-900 leading-tight">Elite Digital Literature</h2>
                                        </div>
                                        <div className="relative w-full md:w-96"><div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={18} /></div><input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder={t.searchPlaceholder} className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-600/20 focus:bg-white rounded-2xl py-4 pl-12 pr-6 outline-none transition-all text-sm font-medium" /></div>
                                    </div>
                                    {filteredCategories.map(cat => (
                                        <div key={cat.id} className="mb-20 last:mb-0">
                                            <div className="flex items-center gap-4 mb-10 text-left"><span className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 whitespace-nowrap">{cat.name}</span><div className="w-full h-[1px] bg-slate-100"></div></div>
                                            <div className="flex gap-10 overflow-x-auto pb-10 no-scrollbar snap-x">
                                                {cat.books.map(book => (
                                                    <div key={book.id} className="flex-shrink-0 w-80 group snap-start transition-all">
                                                        <div className="aspect-[3/4] rounded-3xl overflow-hidden mb-6 shadow-xl relative bg-slate-200 border-2 border-transparent group-hover:border-blue-600/50 transition-all">
                                                            <SafeImage src={book.image} alt={book.title} title={book.title} />
                                                            <div className="absolute inset-0 image-overlay opacity-80 group-hover:opacity-90 transition-opacity"></div>
                                                            
                                                            <div className="absolute bottom-6 left-6 right-6 space-y-4">
                                                                <div>
                                                                    <span className="text-[9px] bg-blue-600 text-white px-3 py-1 rounded-full font-bold uppercase tracking-widest mb-3 inline-block">{book.tag}</span>
                                                                    <h4 className="font-serif italic text-2xl text-white leading-tight">{book.title}</h4>
                                                                    <p className="font-mono text-blue-400 font-bold text-sm mt-1">€{book.price.toFixed(2)}</p>
                                                                </div>
                                                                
                                                                <div className="grid grid-cols-2 gap-3 opacity-0 group-hover:opacity-100 transition-all translate-y-4 group-hover:translate-y-0">
