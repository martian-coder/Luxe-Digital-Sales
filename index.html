<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeDigital | Institutional Digital Assets</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.7s ease-out forwards; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Lucide Icon Wrapper ---
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- DATA ---
        const TOKEN_UNIT_PRICE = 12.50;
        const NETWORK_NAME = "Polygon Mainnet";

        const CATEGORIES = [
            {
                id: 'cat-1',
                name: 'Blockchain Fundamentals',
                books: [
                    { id: 'eb-01', title: 'The Polygon Horizon', price: 29.00, tag: 'Best Seller', image: 'https://images.unsplash.com/photo-1639322537228-f710d846310a?auto=format&fit=crop&q=80&w=800&h=1000' },
                    { id: 'eb-02', title: 'Consensus 101', price: 19.00, tag: 'Beginner', image: 'https://images.unsplash.com/photo-1644088379091-85d94348e351?auto=format&fit=crop&q=80&w=800&h=1000' },
                    { id: 'eb-03', title: 'Ethereum Evolution', price: 35.00, tag: 'New', image: 'https://images.unsplash.com/photo-1621504450181-5d356f63d3ee?auto=format&fit=crop&q=80&w=800&h=1000' },
                ]
            },
            {
                id: 'cat-2',
                name: 'Investment Strategies',
                books: [
                    { id: 'eb-04', title: 'Digital Sovereignty', price: 45.00, tag: 'Premium', image: 'https://images.unsplash.com/photo-1642104704074-907c0698cbd9?auto=format&fit=crop&q=80&w=800&h=1000' },
                    { id: 'eb-05', title: 'Yield Dynamics', price: 55.00, tag: 'Expert', image: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=800&h=1000' },
                    { id: 'eb-06', title: 'Portfolio Balancing', price: 32.00, tag: 'Stable', image: 'https://images.unsplash.com/photo-1611974714013-3c8c6133f1f7?auto=format&fit=crop&q=80&w=800&h=1000' },
                ]
            },
            {
                id: 'cat-3',
                name: 'Technical Architecture',
                books: [
                    { id: 'eb-07', title: 'Web3 Architectures', price: 39.00, tag: 'Technical', image: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=800&h=1000' },
                    { id: 'eb-08', title: 'Smart Contract Design', price: 49.00, tag: 'Advanced', image: 'https://images.unsplash.com/photo-1639322537504-6427a16b0a28?auto=format&fit=crop&q=80&w=800&h=1000' },
                    { id: 'eb-09', title: 'ZK-Rollup Deep Dive', price: 65.00, tag: 'Critical', image: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc48?auto=format&fit=crop&q=80&w=800&h=1000' },
                ]
            }
        ];

        const TRANSLATIONS = {
            EN: {
                hero: "The Standard for Digital Assets.",
                subHero: "Secure acquisition of Genesis ERC20 tokens and curated digital literature. Built on Polygon, designed for the European digital economy.",
                tokenTitle: "Genesis Utility Token",
                buyNow: "Complete Purchase",
                email: "Delivery Email",
                wallet: "Polygon Destination",
                terms: "I acknowledge that transfers on the Polygon Network are irreversible and non-refundable upon delivery.",
                status: ["Authorizing...", "Verified", "Minting...", "Delivered"],
                connect: "Connect Wallet"
            },
            FR: {
                hero: "La Référence des Actifs Numériques.",
                subHero: "Acquisition sécurisée de jetons Genesis ERC20 et littérature numérique. Conçu sur Polygon pour l'économie européenne.",
                tokenTitle: "Jeton Utilitaire Genesis",
                buyNow: "Finaliser l'Achat",
                email: "Email de Livraison",
                wallet: "Destination Polygon",
                terms: "Je reconnais que les transferts sur le réseau Polygon sont irréversibles et non remboursables.",
                status: ["Autorisation...", "Vérifié", "Frappe...", "Livré"],
                connect: "Connecter"
            }
        };

        function App() {
            const [lang, setLang] = useState('EN');
            const [view, setView] = useState('home');
            const [selected, setSelected] = useState(null);
            const [step, setStep] = useState(0);
            const [isConnected, setIsConnected] = useState(false);
            const [email, setEmail] = useState('');
            const [wallet, setWallet] = useState('');
            const [accepted, setAccepted] = useState(false);

            useEffect(() => { lucide.createIcons(); }, [view, step]);

            const t = TRANSLATIONS[lang];
            const total = selected === 'token' ? 12.50 : (selected?.price || 0);

            const handlePurchase = () => {
                setView('status');
                const interval = setInterval(() => {
                    setStep(s => {
                        if (s >= 3) { clearInterval(interval); return 3; }
                        return s + 1;
                    });
                }, 2000);
            };

            return (
                <div className="min-h-screen">
                    {/* NAV */}
                    <nav className="fixed top-0 w-full z-50 bg-[#0F172A] text-white px-6 py-4 shadow-2xl">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('home'); setStep(0); }}>
                                <div className="w-10 h-10 bg-blue-600 flex items-center justify-center rounded-lg"><Icon name="layers" /></div>
                                <span className="font-serif italic text-2xl tracking-tighter">LuxeDigital</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <select value={lang} onChange={e => setLang(e.target.value)} className="bg-blue-900/50 text-xs font-bold border-none rounded-full px-4 py-2 outline-none">
                                    <option value="EN">EN</option>
                                    <option value="FR">FR</option>
                                </select>
                                <button onClick={() => setIsConnected(!isConnected)} className="bg-blue-600 px-6 py-2.5 rounded-lg text-[10px] font-bold uppercase tracking-widest shadow-lg">
                                    {isConnected ? "0x71...976F" : t.connect}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {view === 'home' && (
                        <main className="pt-32 animate-fade-in">
                            {/* HERO */}
                            <section className="max-w-7xl mx-auto px-6 py-16 grid lg:grid-cols-2 gap-16 items-center">
                                <div className="space-y-8">
                                    <span className="text-[10px] font-bold text-blue-600 uppercase tracking-widest border border-blue-200 px-3 py-1 rounded-full bg-blue-50">v4.2 Institutional</span>
                                    <h1 className="text-6xl md:text-7xl font-serif leading-[0.95] text-slate-900">{t.hero}</h1>
                                    <p className="text-lg text-slate-500 font-light leading-relaxed">{t.subHero}</p>
                                    <button onClick={() => { setSelected('token'); setView('checkout'); }} className="bg-blue-600 text-white px-10 py-5 rounded-xl font-bold uppercase tracking-widest text-xs flex items-center gap-3 shadow-xl">Acquire Token <Icon name="arrow-right" size={16}/></button>
                                </div>
                                <div className="bg-[#0F172A] p-12 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                                    <Icon name="cpu" size={48} className="text-blue-500 mb-8" />
                                    <h3 className="text-4xl font-serif mb-4">{t.tokenTitle}</h3>
                                    <div className="space-y-4 text-blue-300 font-light">
                                        <p className="flex items-center gap-2"><Icon name="check" size={16}/> Deterministic Polygon Fulfilment</p>
                                        <p className="flex items-center gap-2"><Icon name="check" size={16}/> Fixed Institutional Pricing</p>
                                    </div>
                                    <div className="mt-12 pt-12 border-t border-white/10">
                                        <p className="text-5xl font-light">€12.50</p>
                                    </div>
                                </div>
                            </section>

                            {/* CATEGORIES */}
                            <section className="bg-white py-24 border-y">
                                <div className="max-w-7xl mx-auto px-6 space-y-24">
                                    {CATEGORIES.map(cat => (
                                        <div key={cat.id}>
                                            <h3 className="text-[11px] font-bold uppercase tracking-[0.3em] text-blue-400 mb-10">{cat.name}</h3>
                                            <div className="flex gap-10 overflow-x-auto pb-10 no-scrollbar snap-x">
                                                {cat.books.map(book => (
                                                    <div key={book.id} onClick={() => { setSelected(book); setView('checkout'); }} className="flex-shrink-0 w-80 group cursor-pointer snap-start">
                                                        <div className="aspect-[3/4] rounded-3xl overflow-hidden mb-8 shadow-2xl group-hover:-translate-y-3 transition-all duration-700 relative">
                                                            <img src={book.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" />
                                                            <div className="absolute inset-0 bg-gradient-to-t from-blue-900/80 to-transparent opacity-40"></div>
                                                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <span className="bg-white text-blue-900 px-8 py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-2xl">Acquire</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex justify-between items-center mb-2">
                                                            <span className="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded font-bold uppercase tracking-widest">{book.tag}</span>
                                                            <span className="font-mono text-blue-900 font-bold">€{book.price.toFixed(2)}</span>
                                                        </div>
                                                        <h4 className="font-serif italic text-xl">{book.title}</h4>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </main>
                    )}

                    {view === 'checkout' && (
                        <main className="pt-32 pb-24 max-w-6xl mx-auto px-6 animate-fade-in">
                            <button onClick={() => setView('home')} className="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-blue-600 mb-12 uppercase tracking-widest"><Icon name="arrow-left" size={14}/> Back</button>
                            <div className="grid lg:grid-cols-12 gap-16">
                                <div className="lg:col-span-7 space-y-12">
                                    <h2 className="text-6xl font-serif text-slate-900">{selected === 'token' ? t.tokenTitle : selected.title}</h2>
                                    <div className="space-y-8 pt-12 border-t">
                                        <div className="space-y-4">
                                            <label className="text-[11px] font-bold uppercase text-slate-500 tracking-widest">{t.email}</label>
                                            <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full border-b-2 border-slate-100 py-4 outline-none focus:border-blue-600 text-2xl font-light" placeholder="email@example.com" />
                                        </div>
                                        {selected === 'token' && (
                                            <div className="space-y-4">
                                                <label className="text-[11px] font-bold uppercase text-slate-500 tracking-widest">{t.wallet}</label>
                                                <input type="text" value={isConnected ? "0x71...976F" : wallet} onChange={e => setWallet(e.target.value)} disabled={isConnected} className="w-full border-b-2 border-slate-100 py-4 outline-none focus:border-blue-600 text-lg font-mono" placeholder="0x..." />
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="lg:col-span-5">
                                    <div className="bg-white p-12 rounded-[2.5rem] shadow-2xl border border-blue-50 space-y-10">
                                        <div className="space-y-4 border-b pb-8">
                                            <div className="flex justify-between"><span>Subtotal</span> <span className="font-mono">€{total.toFixed(2)}</span></div>
                                            <div className="flex justify-between items-end pt-4"><span className="text-2xl font-serif italic">Total</span> <span className="text-5xl font-light text-blue-600">€{total.toFixed(2)}</span></div>
                                        </div>
                                        <label className="flex gap-4 cursor-pointer">
                                            <input type="checkbox" checked={accepted} onChange={e => setAccepted(e.target.checked)} className="mt-1 w-6 h-6 border-slate-300 rounded text-blue-600 focus:ring-0" />
                                            <span className="text-xs text-slate-400 leading-relaxed">{t.terms}</span>
                                        </label>
                                        <button onClick={handlePurchase} disabled={!accepted || !email} className="w-full bg-[#0F172A] text-white py-6 rounded-2xl font-bold uppercase tracking-widest text-xs disabled:opacity-20 shadow-2xl shadow-blue-900/20">Authorize Purchase</button>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {view === 'status' && (
                        <main className="pt-48 pb-24 text-center max-w-xl mx-auto px-6">
                            <div className="flex justify-center mb-16">
                                <div className={`w-32 h-32 rounded-full flex items-center justify-center transition-all ${step === 3 ? 'bg-green-50' : 'bg-blue-50'}`}>
                                    {step === 3 ? <Icon name="check" size={48} className="text-green-600" /> : <Icon name="refresh-ccw" size={32} className="text-blue-600 animate-spin" />}
                                </div>
                            </div>
                            <h2 className="text-5xl font-serif italic mb-4">{t.status[step]}</h2>
                            <p className="text-xs font-mono text-slate-400 uppercase tracking-widest mb-12">LXD-POLY-REF-{Math.random().toString(36).substring(7).toUpperCase()}</p>
                            {step === 3 && (
                                <button onClick={() => window.location.reload()} className="bg-[#0F172A] text-white px-12 py-5 rounded-xl font-bold uppercase text-[10px] tracking-[0.2em]">Return to Library</button>
                            )}
                        </main>
                    )}

                    {/* FOOTER */}
                    <footer className="bg-[#0F172A] text-white py-32 px-6 mt-20 relative">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-4 gap-20">
                            <div className="md:col-span-2 space-y-10">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center"><Icon name="layers" size={16}/></div>
                                    <span className="font-serif italic text-2xl">LuxeDigital</span>
                                </div>
                                <p className="text-blue-200/30 text-base font-light max-w-md leading-relaxed">Deterministic digital asset issuance on the Polygon Network. Engineered for institutional compliance.</p>
                                <p className="text-[10px] font-bold uppercase tracking-[0.4em] text-blue-500">Developed by Amit N</p>
                            </div>
                            <div className="space-y-8">
                                <h4 className="text-[11px] font-bold uppercase tracking-[0.4em] text-blue-400">Ledger</h4>
                                <div className="flex items-center gap-3 text-green-400"><div className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div> <span className="text-[10px] uppercase font-bold tracking-widest">Mainnet Live</span></div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto pt-24 border-t border-white/5 mt-10 flex justify-between text-[11px] font-bold uppercase tracking-[0.5em] text-blue-100/10">
                            <span>&copy; 2026 LuxeDigital Protocol</span>
                            <span>Frankfurt // Paris // London</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
