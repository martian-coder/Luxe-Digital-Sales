<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LuxeDigital | Institutional Digital Assets</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.7s ease-out forwards; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }
        .touch-active:active { transform: scale(0.96); transition: 0.1s; }
        .image-overlay { background: linear-gradient(to top, rgba(15, 23, 42, 0.95) 0%, rgba(15, 23, 42, 0.3) 50%, transparent 100%); }
        .receipt-border { border: 2px dashed #CBD5E1; }
        
        /* Institutional Tooltip */
        .lxd-tooltip { position: relative; display: inline-flex; align-items: center; }
        .lxd-tooltip .tooltiptext {
            visibility: hidden;
            width: 130px;
            background-color: #0F172A;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 6px 0;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .lxd-tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SafeImage = ({ src, alt, title }) => {
            const [error, setError] = useState(false);
            if (error || !src) {
                return (
                    <div className="w-full h-full bg-gradient-to-br from-blue-950 to-blue-800 flex flex-col items-center justify-center p-6 text-center">
                        <Icon name="book-open" size={40} className="text-blue-500/30 mb-3" />
                        <span className="font-serif italic text-white/80 text-sm leading-tight px-4">{title}</span>
                    </div>
                );
            }
            return (
                <img src={src} alt={alt} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" onError={() => setError(true)} />
            );
        };

        // --- CORE DATA ---
        const TOKEN_UNIT_PRICE = 12.50;
        const REWARD_AMOUNT = 1.00;

        const CATEGORIES = [
            {
                id: 'cat-1',
                name: 'Core Curriculum',
                books: [
                    { id: 'eb-01', title: 'The Polygon Horizon', price: 29.00, tag: 'Bestseller', image: 'https://images.unsplash.com/photo-1639322537228-f710d846310a?auto=format&fit=crop&q=80&w=800&h=1000' },
                    { id: 'eb-02', title: 'Mastering Bitcoin', price: 39.00, tag: 'Technical', image: 'https://images.unsplash.com/photo-1621416848446-9f6efdec403d?q=80&w=800&auto=format&fit=crop' },
                    { id: 'eb-03', title: 'Blockchain Revolution', price: 35.00, tag: 'Essential', image: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=800&auto=format&fit=crop' }
                ]
            },
            {
                id: 'cat-2',
                name: 'Strategic Insights',
                books: [
                    { id: 'eb-04', title: 'Yield Dynamics', price: 45.00, tag: 'Recommended', image: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=800&h=1000' },
                    { id: 'eb-05', title: 'Digital Sovereignty', price: 55.00, tag: 'New Release', image: 'https://images.unsplash.com/photo-1642104704074-907c0698cbd9?auto=format&fit=crop&q=80&w=800&h=1000' },
                    { id: 'eb-06', title: 'Technical Architecture', price: 32.00, tag: 'Advanced', image: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=800&h=1000' }
                ]
            }
        ];

        const TRANSLATIONS = {
            EN: { 
                hero: "Institutional Assets.", 
                subHero: "Secure acquisition of Genesis ERC20 tokens and curated digital literature. Built on Polygon.", 
                tokenTitle: "Genesis Utility Token", 
                buyNow: "Authorize & Buy", 
                email: "Delivery Email", 
                wallet: "Wallet Destination", 
                history: "Vault", 
                back: "Back", 
                readBtn: "Read & Earn", 
                acquireBtn: "Acquire Now", 
                claimReward: "Claim 1.00 GEN", 
                rewardPending: "Allocating Reward...", 
                rewardSuccess: "Credited to Vault", 
                search: "Search library...",
                terms: "I acknowledge that transfers on the Polygon Network are irreversible and non-refundable upon delivery. I am responsible for wallet accuracy.",
                status: ["Web3 Handshake...", "Verifying Payment", "Broadcasting to Polygon", "Asset Dispatched"]
            },
            FR: { hero: "Actifs Institutionnels.", subHero: "Acquisition sécurisée de jetons Genesis ERC20 et littérature numérique. Conçu sur Polygon.", tokenTitle: "Jeton Genesis", buyNow: "Autoriser & Acheter", email: "Email de Livraison", wallet: "Portefeuille", history: "Coffre", back: "Retour", readBtn: "Lire & Gagner", acquireBtn: "Acquérir", claimReward: "Réclamer", rewardPending: "Allocation...", rewardSuccess: "Créditée", search: "Rechercher...", terms: "Je reconnais que les transferts sur le réseau Polygon sont irréversibles.", status: ["Signature Web3...", "Vérification", "Diffusion", "Envoyé"] },
            PT: { hero: "Ativos Institucionais.", subHero: "Aquisição segura de tokens Genesis ERC20 e literatura digital. Construído na Polygon.", tokenTitle: "Token Genesis", buyNow: "Autorizar & Comprar", email: "E-mail de Entrega", wallet: "Carteira", history: "Cofre", back: "Voltar", readBtn: "Ler & Ganhar", acquireBtn: "Adquirir", claimReward: "Resgatar", rewardPending: "Alocando...", rewardSuccess: "Creditada", search: "Pesquisar...", terms: "Reconheço que as transferências na Rede Polygon são irreversíveis.", status: ["Assinatura Web3...", "Verificando", "Transmitindo", "Concluído"] },
            ES: { hero: "Activos Institucionales.", subHero: "Adquisición segura de tokens Genesis ERC20 y literatura digital. Construido en Polygon.", tokenTitle: "Token Genesis", buyNow: "Autorizar & Comprar", email: "Email", wallet: "Billetera", history: "Bóveda", back: "Atrás", readBtn: "Leer & Ganar", acquireBtn: "Adquirir", claimReward: "Reclamar", rewardPending: "Asignando...", rewardSuccess: "Acreditado", search: "Buscar...", terms: "Reconozco que las transferencias en la Red Polygon son irreversibles.", status: ["Firma Web3...", "Verificando", "Transmitiendo", "Enviado"] },
            DE: { hero: "Institutionelle Assets.", subHero: "Sicherer Erwerb von Genesis ERC20-Token und digitaler Literatur. Auf Polygon.", tokenTitle: "Genesis Token", buyNow: "Bestätigen", email: "E-Mail", wallet: "Wallet", history: "Tresor", back: "Zurück", readBtn: "Lesen & Verdienen", acquireBtn: "Erwerben", claimReward: "Einfordern", rewardPending: "Zuweisung...", rewardSuccess: "Gutgeschrieben", search: "Suche...", terms: "Ich bestätige, dass Übertragungen im Polygon-Netzwerk unwiderruflich sind.", status: ["Web3 Handshake...", "Prüfung", "Polygon Transfer", "Asset versendet"] },
            IT: { hero: "Asset Istituzionali.", subHero: "Acquisizione sicura di token Genesis ERC20 e letteratura digitale. Su Polygon.", tokenTitle: "Token Genesis", buyNow: "Autorizza", email: "Email", wallet: "Wallet", history: "Caveau", back: "Indietro", readBtn: "Leggi & Guadagna", acquireBtn: "Acquista", claimReward: "Riscatta", rewardPending: "Assegnazione...", rewardSuccess: "Accreditato", search: "Cerca...", terms: "Riconosco che i trasferimenti sulla rete Polygon sono irreversibili.", status: ["Firma Web3...", "Verifica", "Trasmissione", "Inviato"] }
        };

        function App() {
            const [lang, setLang] = useState('EN');
            const [view, setView] = useState('home'); 
            const [selected, setSelected] = useState(null);
            const [step, setStep] = useState(0);
            const [searchQuery, setSearchQuery] = useState('');
            const [paymentType, setPaymentType] = useState('stripe');
            
            const [purchaseHistory, setPurchaseHistory] = useState(() => {
                const saved = localStorage.getItem('lxd_history_v9');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => { localStorage.setItem('lxd_history_v9', JSON.stringify(purchaseHistory)); }, [purchaseHistory]);

            const earnedBalance = useMemo(() => purchaseHistory.reduce((acc, curr) => curr.isReward ? acc + (curr.qty || 0) : acc, 0), [purchaseHistory]);

            const [discoveryBook, setDiscoveryBook] = useState(null);
            const [discoveryPage, setDiscoveryPage] = useState(1);
            const [rewardState, setRewardState] = useState(0); 

            const [currentTransactionId, setCurrentTransactionId] = useState('');
            const [historyItemDetail, setHistoryItemDetail] = useState(null);
            const [isWalletModalOpen, setIsWalletModalOpen] = useState(false);
            const [isConnecting, setIsConnecting] = useState(false);
            const [isConnected, setIsConnected] = useState(false);
            const [walletProvider, setWalletProvider] = useState(null);
            
            const [email, setEmail] = useState('');
            const [qty, setQty] = useState(1);
            const [manualWallet, setManualWallet] = useState('');
            const [accepted, setAccepted] = useState(false);

            useEffect(() => { lucide.createIcons(); }, [view, step, isWalletModalOpen, isConnecting, searchQuery, historyItemDetail, paymentType, discoveryBook, discoveryPage, rewardState, lang]);

            const t = TRANSLATIONS[lang] || TRANSLATIONS.EN;
            const total = selected === 'token' ? (qty * TOKEN_UNIT_PRICE) : (selected?.price || 0);

            const filteredCategories = useMemo(() => {
                return CATEGORIES.map(cat => ({
                    ...cat,
                    books: cat.books.filter(book => book.title.toLowerCase().includes(searchQuery.toLowerCase()))
                })).filter(cat => cat.books.length > 0);
            }, [searchQuery]);

            const handleConnect = (provider) => {
                setIsConnecting(true); setWalletProvider(provider);
                setTimeout(() => { setIsConnecting(false); setIsConnected(true); setIsWalletModalOpen(false); }, 1200);
            };

            const handleDiscoveryClick = (book) => {
                setDiscoveryBook(book); setDiscoveryPage(1); setRewardState(0);
                setTimeout(() => { document.getElementById('discovery-reader')?.scrollIntoView({ behavior: 'smooth' }); }, 100);
            };

            const handleFinalPurchase = () => {
                const txId = `LXD-POLY-${Math.random().toString(36).substring(2, 12).toUpperCase()}`;
                setCurrentTransactionId(txId); setView('status');
                const interval = setInterval(() => {
                    setStep(s => {
                        if (s >= 3) { 
                            clearInterval(interval); 
                            setPurchaseHistory(prev => [{ 
                                id: txId, 
                                date: new Date().toLocaleString(), 
                                item: selected === 'token' ? 'Genesis Utility Token' : (selected?.title || 'Unknown'), 
                                type: selected === 'token' ? 'ERC20' : 'Ebook', 
                                qty: selected === 'token' ? qty : 1, 
                                amount: total, 
                                email: email, 
                                wallet: isConnected ? '0x71...976F' : (manualWallet || 'N/A') 
                            }, ...prev]);
                            return 3; 
                        }
                        return s + 1;
                    });
                }, 1800);
            };

            const claimDiscoveryReward = () => {
                setRewardState(1);
                setTimeout(() => setRewardState(2), 2000);
                setTimeout(() => {
                    const tx = `LXD-EARN-${Math.random().toString(36).substring(2, 8).toUpperCase()}`;
                    setPurchaseHistory(prev => [{ id: tx, date: new Date().toLocaleString(), item: `Reward: ${discoveryBook?.title || 'Study'}`, type: 'ERC20', qty: REWARD_AMOUNT, amount: 0, isReward: true, email: email || 'learner@protocol.io' }, ...prev]);
                    setRewardState(3);
                }, 3500);
            };

            const DigitalReceipt = ({ data, onBack }) => (
                <div className="space-y-8 animate-fade-in max-w-xl mx-auto py-6 text-left">
                    <div className="bg-white p-6 md:p-10 rounded-[2rem] shadow-2xl border-t-8 border-blue-600 relative overflow-hidden">
                        <header className="flex justify-between items-center mb-8 border-b pb-6">
                            <div><h3 className="text-2xl font-serif italic text-blue-900 leading-none mb-1">Receipt</h3><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Verification ID</p></div>
                            <div className="text-right shrink-0"><p className="text-[9px] font-bold text-slate-500 uppercase">Order Ref</p><p className="font-mono text-[10px] text-blue-600">{data.id}</p></div>
                        </header>
                        <div className="space-y-4 mb-8 text-sm">
                            <div className="flex justify-between border-b border-slate-50 pb-2"><span>Recipient</span><span className="font-medium truncate ml-4 italic">{data.email || 'Verified Institutional'}</span></div>
                            <div className="flex justify-between border-b border-slate-50 pb-2"><span>Date</span><span className="font-medium">{data.date}</span></div>
                        </div>
                        <div className="receipt-border p-4 rounded-xl space-y-3 mb-6 bg-slate-50/50">
                            <div className="flex justify-between text-xs"><span className="text-slate-500">{data.item}</span><span className="font-mono font-bold">€{(data.amount || 0).toFixed(2)}</span></div>
                            <div className="pt-3 border-t border-slate-200 flex justify-between items-baseline"><span className="text-sm font-serif italic">Settlement</span><span className="text-3xl font-light text-blue-600">€{(data.amount || 0).toFixed(2)}</span></div>
                        </div>
                        <footer className="text-center opacity-20 text-[8px] font-mono uppercase tracking-[0.4em]">LuxeDigital Institutional Ledger — Amit N — 2026</footer>
                    </div>
                    <button onClick={onBack} className="bg-[#0F172A] text-white w-full py-4 rounded-xl font-bold uppercase text-[10px] tracking-[0.2em] shadow-xl hover:scale-[1.01] transition-transform">Back to Ecosystem</button>
                </div>
            );

            return (
                <div className="min-h-screen selection:bg-blue-100 overflow-x-hidden text-left">
                    {/* NAV */}
                    <nav className="fixed top-0 w-full z-50 bg-[#0F172A] text-white px-4 py-3 md:py-4 shadow-2xl border-b border-blue-900/30 no-print">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => { setView('home'); setDiscoveryBook(null); setHistoryItemDetail(null); }}>
                                <div className="w-8 h-8 md:w-10 md:h-10 bg-blue-600 flex items-center justify-center rounded-lg shadow-lg group-hover:rotate-12 transition-transform"><Icon name="layers" size={18} /></div>
                                <span className="font-serif italic text-lg md:text-2xl tracking-tighter">LuxeDigital</span>
                            </div>
                            
                            <div className="flex items-center gap-2.5 md:gap-6">
                                <div className="flex items-center gap-1.5 border border-blue-800 rounded-full px-2 py-1 bg-blue-900/40">
                                    <Icon name="globe" size={12} className="text-blue-400" />
                                    <select value={lang} onChange={e => setLang(e.target.value)} className="bg-transparent text-[10px] font-bold outline-none cursor-pointer border-none p-0">
                                        {Object.keys(TRANSLATIONS).map(l => <option key={l} value={l} className="text-black">{l}</option>)}
                                    </select>
                                </div>
                                <button onClick={() => { setView('history'); setDiscoveryBook(null); setHistoryItemDetail(null); }} className="text-[10px] font-bold uppercase text-blue-300/60 flex items-center gap-1.5 active:text-white transition-colors">
                                    <Icon name="box" size={14} />
                                    <span className="hidden sm:inline">{t.history}</span>
                                </button>
                                <button onClick={() => isConnected ? setIsConnected(false) : setIsWalletModalOpen(true)} className="bg-blue-600 px-3 py-2 md:px-5 rounded-lg text-[9px] font-bold uppercase tracking-widest shadow-lg flex items-center gap-2 transition-all active:scale-95">
                                    <Icon name="wallet" size={14} />
                                    <span className="font-bold">{isConnected ? "Linked Wallet" : "Link Wallet"}</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {view === 'home' && (
                        <main className="pt-24 md:pt-32 animate-fade-in">
                            {/* HERO */}
                            <section className="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-20 grid lg:grid-cols-2 gap-12 md:gap-20 items-center">
                                <div className="space-y-6 md:space-y-10 text-center lg:text-left">
                                    <div className="inline-flex items-center gap-2 bg-blue-600/10 border border-blue-600/20 px-4 py-1.5 rounded-full">
                                        <Icon name="award" size={12} className="text-blue-600" />
                                        <span className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Multi-Language Discovery — Amit N — 2026</span>
                                    </div>
                                    <h1 className="text-4xl md:text-7xl lg:text-8xl font-serif text-slate-900 tracking-tight leading-tight md:leading-[0.95]">{t.hero}</h1>
                                    <p className="text-base md:text-xl text-slate-500 font-light leading-relaxed max-w-lg mx-auto lg:mx-0">{t.subHero}</p>
                                    <button onClick={() => { setSelected('token'); setView('checkout'); }} className="bg-blue-600 hover:bg-blue-700 text-white px-8 md:px-10 py-4 md:py-5 rounded-xl font-bold uppercase tracking-widest text-[10px] md:text-xs flex items-center justify-center gap-3 shadow-2xl transition-all hover:-translate-y-1 mx-auto lg:mx-0 touch-active">{t.acquireBtn} Token <Icon name="arrow-right" size={16}/></button>
                                </div>
                                <div className="relative group">
                                    <div className="bg-[#0F172A] p-8 md:p-12 rounded-[2.5rem] md:rounded-[3rem] text-white shadow-2xl relative overflow-hidden border border-white/5 text-left">
                                        <div className="flex justify-between items-start mb-8 md:mb-12"><div className="w-12 h-12 md:w-16 md:h-16 bg-blue-600/20 border border-blue-500/30 rounded-2xl flex items-center justify-center"><Icon name="cpu" size={28} className="text-blue-500" /></div><span className="text-[10px] font-bold uppercase tracking-widest text-blue-400">Deterministic Pool</span></div>
                                        <h3 className="text-3xl md:text-4xl font-serif mb-4 md:mb-6">{t.tokenTitle}</h3>
                                        <div className="space-y-4 text-blue-300 font-light text-sm">
                                            <p className="flex items-center gap-3"><Icon name="shield-check" size={18} className="text-blue-500"/> Verified ERC20 Protocol</p>
                                            <p className="flex items-center gap-3"><Icon name="sparkles" size={18} className="text-blue-500"/> Study Incentive Rebates</p>
                                        </div>
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-blue-600/5 rounded-full blur-[80px] -translate-y-1/2 translate-x-1/2"></div>
                                    </div>
                                </div>
                            </section>

                            {/* DIGITAL LIBRARY */}
                            <section className="bg-white py-16 md:py-24 border-y border-slate-100">
                                <div className="max-w-7xl mx-auto px-4 md:px-6">
                                    <div className="flex flex-col md:flex-row md:items-end justify-between mb-12 md:mb-16 gap-6">
                                        <div className="space-y-4 text-left"><h3 className="text-[11px] font-bold uppercase tracking-[0.4em] text-blue-600">Global Repository</h3><h2 className="text-3xl md:text-4xl font-serif text-slate-900 leading-tight">Elite Digital Literature</h2></div>
                                        <div className="relative w-full md:w-96 group">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-600 transition-colors"><Icon name="search" size={16} /></div>
                                            <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder={t.search} className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-600/20 focus:bg-white rounded-2xl py-3.5 pl-11 pr-6 outline-none transition-all text-sm font-medium" />
                                        </div>
                                    </div>
                                    {filteredCategories.map(cat => (
                                        <div key={cat.id} className="mb-16 md:mb-20 last:mb-0">
                                            <div className="flex items-center gap-4 mb-8 md:mb-10 text-left"><span className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 whitespace-nowrap">{cat.name}</span><div className="w-full h-[1px] bg-slate-100"></div></div>
                                            <div className="flex gap-6 md:gap-10 overflow-x-auto pb-8 md:pb-10 no-scrollbar snap-x">
                                                {cat.books.map(book => (
                                                    <div key={book.id} className="flex-shrink-0 w-64 md:w-80 group snap-start">
                                                        <div className="aspect-[3/4] rounded-[2rem] md:rounded-[2.5rem] overflow-hidden mb-6 shadow-xl relative bg-slate-200 border-2 border-transparent hover:border-blue-600/50 transition-all cursor-pointer" onClick={() => handleDiscoveryClick(book)}>
                                                            <SafeImage src={book.image} alt={book.title} title={book.title} />
                                                            <div className="absolute inset-0 image-overlay opacity-80 group-hover:opacity-90 transition-opacity"></div>
                                                            <div className="absolute bottom-6 left-6 right-6 space-y-4 text-left">
                                                                <div>
                                                                    <span className="text-[9px] bg-blue-600 text-white px-3 py-0.5 rounded-full font-bold uppercase tracking-widest mb-2 inline-block">{book.tag}</span>
                                                                    <h4 className="font-serif italic text-xl md:text-2xl text-white leading-tight">{book.title}</h4>
                                                                    <p className="font-mono text-blue-400 font-bold text-xs mt-1">€{book.price.toFixed(2)}</p>
                                                                </div>
                                                                <div className="grid grid-cols-2 gap-2 opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0 transition-all duration-300">
                                                                    <button className="bg-white/10 backdrop-blur-md border border-white/20 text-white text-[8px] font-bold uppercase py-2.5 rounded-lg hover:bg-white hover:text-blue-900 transition-all">{t.readBtn}</button>
                                                                    <button onClick={(e) => { e.stopPropagation(); setSelected(book); setView('checkout'); }} className="bg-blue-600 text-white text-[8px] font-bold uppercase py-2.5 rounded-lg shadow-xl hover:bg-blue-700 transition-all">{t.acquireBtn}</button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* DISCOVERY READER SECTION */}
                            {discoveryBook && (
